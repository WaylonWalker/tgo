name: Release

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: 1.24
      - name: Build cross-platform binaries
        run: |
          set -euo pipefail
          artifacts=artifacts
          mkdir -p "$artifacts"
          combos=(
            linux:amd64
            linux:arm64
            darwin:amd64
            darwin:arm64
            windows:amd64
            windows:arm64
          )
          for combo in "${combos[@]}"; do
            os=${combo%%:*}
            arch=${combo##*:}
            bin_name="tgo-${os}-${arch}"
            bin_path="$artifacts/${bin_name}"
            if [[ "$os" == "windows" ]]; then
              bin_path+=".exe"
            fi
            GOOS="$os" GOARCH="$arch" go build -ldflags "-s -w" -o "$bin_path" ./cmd/tgo
            archive="$artifacts/${bin_name}.zip"
            zip -j "$archive" "$bin_path"
            rm "$bin_path"
          done
          sha256sum "$artifacts"/*.zip > "$artifacts/checksums.txt"
      - name: Publish release assets
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/*.zip
            artifacts/checksums.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
